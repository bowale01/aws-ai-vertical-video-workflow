AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Elemental Inference – AI-powered vertical video (9:16) workflow.
  Ingests SRT push stream from OBS Studio, applies smart cropping via Elemental Inference,
  outputs 1080x1920 vertical stream simultaneously to:
  - HLS via MediaPackage v2 + CloudFront (live viewing on phone/browser)
  - RTMP direct push to TikTok LIVE, YouTube Shorts, Instagram Reels, Facebook LIVE
  Also harvests highlight clips via EventBridge + Step Functions + MediaConvert → S3.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: vertical-video-demo
    Description: Prefix for all resource names

  SrtPort:
    Type: Number
    Default: 1935
    Description: Port for RTMP push input on MediaLive (default RTMP port)

  VideoBitrate:
    Type: Number
    Default: 6000000
    Description: Output video bitrate in bps (4500-6000 kbps adaptive streaming)

  AudioBitrate:
    Type: Number
    Default: 192000
    Description: Output audio bitrate in bps (128-192 kbps per spec)

  HlsSegmentDuration:
    Type: Number
    Default: 2
    Description: HLS segment duration in seconds (2s for low latency)

  # Social media RTMP stream keys (optional - leave blank to disable)
  TikTokStreamKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: TikTok LIVE stream key (optional - get from TikTok LIVE Studio)

  YouTubeStreamKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: YouTube LIVE stream key (optional - get from YouTube Studio)

  InstagramStreamKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Instagram/Facebook LIVE stream key (optional - get from Creator Studio)

  FacebookStreamKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Facebook LIVE stream key (optional - get from Creator Studio)

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  EnableTikTok: !Not [!Equals [!Ref TikTokStreamKey, ""]]
  EnableYouTube: !Not [!Equals [!Ref YouTubeStreamKey, ""]]
  EnableInstagram: !Not [!Equals [!Ref InstagramStreamKey, ""]]
  EnableFacebook: !Not [!Equals [!Ref FacebookStreamKey, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # S3 – stores harvested VOD clips and MediaConvert output
  # -------------------------------------------------------------------------
  ClipsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-clips-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldClips
            Status: Enabled
            ExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET]
            AllowedOrigins: ["*"]
            MaxAge: 3000

  ClipsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ClipsBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ClipsBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # -------------------------------------------------------------------------
  # S3 – live stream archive (stores full HLS segments from MediaPackage)
  # -------------------------------------------------------------------------
  LiveArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-live-archive-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLiveSegments
            Status: Enabled
            ExpirationInDays: 7      # Keep 7 days of live archive
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA   # Move to cheaper storage after 30 days
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET]
            AllowedOrigins: ["*"]
            MaxAge: 3000
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-live-archive"

  LiveArchiveBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LiveArchiveBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${LiveArchiveBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
          - Sid: MediaPackageWriteAccess
            Effect: Allow
            Principal:
              Service: mediapackagev2.amazonaws.com
            Action:
              - s3:PutObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub "arn:aws:s3:::${LiveArchiveBucket}"
              - !Sub "arn:aws:s3:::${LiveArchiveBucket}/*"

  # -------------------------------------------------------------------------
  # IAM – MediaLive role
  # -------------------------------------------------------------------------
  MediaLiveRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-medialive-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: medialive.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess
      Policies:
        - PolicyName: MediaLivePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - mediapackagev2:PutObject
                  - mediapackagev2:ListChannels
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - elemental-inference:*
                Resource: "*"

  # -------------------------------------------------------------------------
  # IAM – MediaPackage v2 role
  # -------------------------------------------------------------------------
  MediaPackageRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-mediapackage-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: mediapackagev2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MediaPackagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${ClipsBucket}"
                  - !Sub "arn:aws:s3:::${ClipsBucket}/*"
                  - !Sub "arn:aws:s3:::${EnvironmentName}-live-archive-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::${EnvironmentName}-live-archive-${AWS::AccountId}/*"

  # -------------------------------------------------------------------------
  # IAM – Lambda role for highlight clip processing
  # -------------------------------------------------------------------------
  ClipLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-clip-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ClipAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ClipsBucket.Arn
                  - !Sub "${ClipsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ClipNotificationTopic

  # -------------------------------------------------------------------------
  # MediaLive – Input Security Group (allow SRT from anywhere for demo)
  # -------------------------------------------------------------------------
  MediaLiveInputSecurityGroup:
    Type: AWS::MediaLive::InputSecurityGroup
    Properties:
      WhitelistRules:
        - Cidr: "0.0.0.0/0"   # Restrict to your encoder IP in production
      Tags:
        Name: !Sub "${EnvironmentName}-isg"

  # -------------------------------------------------------------------------
  # MediaLive – SRT Push Input
  # -------------------------------------------------------------------------
  MediaLiveSrtInput:
    Type: AWS::MediaLive::Input
    Properties:
      Name: !Sub "${EnvironmentName}-rtmp-input"
      Type: RTMP_PUSH
      InputSecurityGroups:
        - !Ref MediaLiveInputSecurityGroup
      Destinations:
        - StreamName: !Sub "${EnvironmentName}/stream"
      Tags:
        Name: !Sub "${EnvironmentName}-rtmp-input"

  # -------------------------------------------------------------------------
  # MediaPackage v2 – Channel Group
  # -------------------------------------------------------------------------
  MediaPackageChannelGroup:
    Type: AWS::MediaPackageV2::ChannelGroup
    Properties:
      ChannelGroupName: !Sub "${EnvironmentName}-channel-group"
      Description: Channel group for vertical video demo
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-channel-group"

  # -------------------------------------------------------------------------
  # MediaPackage v2 – Channel
  # -------------------------------------------------------------------------
  MediaPackageChannel:
    Type: AWS::MediaPackageV2::Channel
    DependsOn: MediaPackageChannelGroup
    Properties:
      ChannelGroupName: !Sub "${EnvironmentName}-channel-group"
      ChannelName: !Sub "${EnvironmentName}-channel"
      Description: Vertical video live channel
      InputType: HLS
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-channel"

  # -------------------------------------------------------------------------
  # MediaPackage v2 – HLS Origin Endpoint
  # -------------------------------------------------------------------------
  MediaPackageHlsEndpoint:
    Type: AWS::MediaPackageV2::OriginEndpoint
    DependsOn: MediaPackageChannel
    Properties:
      ChannelGroupName: !Sub "${EnvironmentName}-channel-group"
      ChannelName: !Sub "${EnvironmentName}-channel"
      OriginEndpointName: !Sub "${EnvironmentName}-hls-endpoint"
      ContainerType: TS
      StartoverWindowSeconds: 900
      HlsManifests:
        - ManifestName: index
          ManifestWindowSeconds: 60
          ProgramDateTimeIntervalSeconds: 1
      Segment:
        SegmentDurationSeconds: 6
        SegmentName: seg
        TsUseAudioRenditionGroup: false
        IncludeIframeOnlyStreams: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-hls-endpoint"

  # -------------------------------------------------------------------------
  # MediaPackage v2 – Endpoint Policy (allows public read for playback)
  # -------------------------------------------------------------------------
  MediaPackageEndpointPolicy:
    Type: AWS::MediaPackageV2::OriginEndpointPolicy
    DependsOn: MediaPackageHlsEndpoint
    Properties:
      ChannelGroupName: !Sub "${EnvironmentName}-channel-group"
      ChannelName: !Sub "${EnvironmentName}-channel"
      OriginEndpointName: !Sub "${EnvironmentName}-hls-endpoint"
      Policy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: mediapackagev2:GetObject
            Resource: !GetAtt MediaPackageHlsEndpoint.Arn

  # -------------------------------------------------------------------------
  # Elemental Inference – Feed for AI smart cropping
  # Note: For smart crop, do NOT include a cropping output in the feed.
  # MediaLive will create the cropping output automatically when the channel starts.
  # -------------------------------------------------------------------------
  ElementalInferenceFeed:
    Type: AWS::ElementalInference::Feed
    Properties:
      Name: !Sub "${EnvironmentName}-feed"
      Outputs: []
      Tags:
        Name: !Sub "${EnvironmentName}-feed"

  # -------------------------------------------------------------------------
  # MediaLive – Channel (16:9 in → 9:16 out with Elemental Inference)
  # -------------------------------------------------------------------------
  MediaLiveChannel:
    Type: AWS::MediaLive::Channel
    DependsOn:
      - MediaPackageHlsEndpoint
      - ElementalInferenceFeed
    Properties:
      Name: !Sub "${EnvironmentName}-channel"
      RoleArn: !GetAtt MediaLiveRole.Arn
      ChannelClass: SINGLE_PIPELINE
      InferenceSettings:
        FeedArn: !GetAtt ElementalInferenceFeed.Arn
      InputSpecification:
        Codec: AVC
        MaximumBitrate: MAX_20_MBPS
        Resolution: HD

      InputAttachments:
        - InputAttachmentName: srt-source
          InputId: !Ref MediaLiveSrtInput
          InputSettings:
            SourceEndBehavior: CONTINUE
            InputFilter: AUTO
            FilterStrength: 1
            DeblockFilter: DISABLED
            DenoiseFilter: DISABLED

      EncoderSettings:
        # Global configuration
        GlobalConfiguration:
          InputEndAction: SWITCH_AND_LOOP_INPUTS
          OutputTimingSource: SYSTEM_CLOCK
          SupportLowFramerateInputs: DISABLED

        # Timecode config
        TimecodeConfig:
          Source: SYSTEMCLOCK

        # --- Video descriptions ---
        VideoDescriptions:
          - Name: video_1080x1920
            Width: 1080
            Height: 1920
            RespondToAfd: NONE
            ScalingBehavior: SMART_CROP
            Sharpness: 50
            CodecSettings:
              H264Settings:
                AdaptiveQuantization: HIGH
                AfdSignaling: NONE
                Bitrate: !Ref VideoBitrate
                BufFillPct: 90
                BufSize: 12000000
                ColorMetadata: INSERT
                ColorSpaceSettings:
                  ColorSpacePassthroughSettings: {}
                EntropyEncoding: CABAC
                FlickerAq: ENABLED
                ForceFieldPictures: DISABLED
                FramerateControl: SPECIFIED
                FramerateDenominator: 1
                FramerateNumerator: 30
                GopBReference: ENABLED
                GopClosedCadence: 1
                GopNumBFrames: 2
                GopSize: 60
                GopSizeUnits: FRAMES
                Level: H264_LEVEL_4_1
                LookAheadRateControl: HIGH
                MaxBitrate: 8000000
                MinIInterval: 0
                NumRefFrames: 3
                ParControl: SPECIFIED
                ParDenominator: 16
                ParNumerator: 9
                Profile: HIGH
                QvbrQualityLevel: 8
                RateControlMode: QVBR
                ScanType: PROGRESSIVE
                SceneChangeDetect: ENABLED
                SpatialAq: ENABLED
                SubgopLength: FIXED
                Syntax: DEFAULT
                TemporalAq: ENABLED
                TimecodeInsertion: DISABLED

        # --- Audio descriptions ---
        AudioDescriptions:
          - Name: audio_aac_192k
            AudioSelectorName: default
            CodecSettings:
              AacSettings:
                Bitrate: 192000
                CodingMode: CODING_MODE_2_0
                InputType: NORMAL
                Profile: LC
                RateControlMode: CBR
                RawFormat: NONE
                SampleRate: 48000
                Spec: MPEG4

        # --- Output groups ---
        OutputGroups:
          # HLS output to MediaPackage v2 (via ingest URL)
          - Name: MediaPackageGroup
            OutputGroupSettings:
              HlsGroupSettings:
                Destination:
                  DestinationRefId: mediapackage-dest
                HlsCdnSettings:
                  HlsBasicPutSettings:
                    NumRetries: 10
                    ConnectionRetryInterval: 1
                SegmentLength: 6
                MinSegmentLength: 0
            Outputs:
              - OutputName: vertical-1080p-hls
                VideoDescriptionName: video_1080x1920
                AudioDescriptionNames:
                  - audio_aac_192k
                OutputSettings:
                  HlsOutputSettings:
                    NameModifier: _1
                    HlsSettings:
                      StandardHlsSettings:
                        M3u8Settings:
                          AudioFramesPerPes: 4
                          PcrControl: PCR_EVERY_PES_PACKET

          # RTMP output to TikTok LIVE
          - !If
            - EnableTikTok
            - Name: TikTokRtmpGroup
              OutputGroupSettings:
                RtmpGroupSettings:
                  AuthenticationScheme: COMMON
                  CacheFullBehavior: DISCONNECT_IMMEDIATELY
                  CacheLength: 30
                  CaptionData: EXCLUDE
                  RestartDelay: 15
                  InputLossAction: EMIT_OUTPUT
              Outputs:
                - OutputName: tiktok-1080p
                  VideoDescriptionName: video_1080x1920
                  AudioDescriptionNames:
                    - audio_aac_192k
                  OutputSettings:
                    RtmpOutputSettings:
                      ConnectionRetryInterval: 2
                      NumRetries: 10
                      Destination:
                        DestinationRefId: tiktok-dest
            - !Ref AWS::NoValue

          # RTMP output to YouTube LIVE
          - !If
            - EnableYouTube
            - Name: YouTubeRtmpGroup
              OutputGroupSettings:
                RtmpGroupSettings:
                  AuthenticationScheme: COMMON
                  CacheFullBehavior: DISCONNECT_IMMEDIATELY
                  CacheLength: 30
                  CaptionData: EXCLUDE
                  RestartDelay: 15
                  InputLossAction: EMIT_OUTPUT
              Outputs:
                - OutputName: youtube-1080p
                  VideoDescriptionName: video_1080x1920
                  AudioDescriptionNames:
                    - audio_aac_192k
                  OutputSettings:
                    RtmpOutputSettings:
                      ConnectionRetryInterval: 2
                      NumRetries: 10
                      Destination:
                        DestinationRefId: youtube-dest
            - !Ref AWS::NoValue

          # RTMP output to Instagram LIVE
          - !If
            - EnableInstagram
            - Name: InstagramRtmpGroup
              OutputGroupSettings:
                RtmpGroupSettings:
                  AuthenticationScheme: COMMON
                  CacheFullBehavior: DISCONNECT_IMMEDIATELY
                  CacheLength: 30
                  CaptionData: EXCLUDE
                  RestartDelay: 15
                  InputLossAction: EMIT_OUTPUT
              Outputs:
                - OutputName: instagram-1080p
                  VideoDescriptionName: video_1080x1920
                  AudioDescriptionNames:
                    - audio_aac_192k
                  OutputSettings:
                    RtmpOutputSettings:
                      ConnectionRetryInterval: 2
                      NumRetries: 10
                      Destination:
                        DestinationRefId: instagram-dest
            - !Ref AWS::NoValue

          # RTMP output to Facebook LIVE
          - !If
            - EnableFacebook
            - Name: FacebookRtmpGroup
              OutputGroupSettings:
                RtmpGroupSettings:
                  AuthenticationScheme: COMMON
                  CacheFullBehavior: DISCONNECT_IMMEDIATELY
                  CacheLength: 30
                  CaptionData: EXCLUDE
                  RestartDelay: 15
                  InputLossAction: EMIT_OUTPUT
              Outputs:
                - OutputName: facebook-1080p
                  VideoDescriptionName: video_1080x1920
                  AudioDescriptionNames:
                    - audio_aac_192k
                  OutputSettings:
                    RtmpOutputSettings:
                      ConnectionRetryInterval: 2
                      NumRetries: 10
                      Destination:
                        DestinationRefId: facebook-dest
            - !Ref AWS::NoValue

      Destinations:
        - Id: mediapackage-dest
          Settings:
            - Url: !Select [0, !GetAtt MediaPackageChannel.IngestEndpointUrls]
        - !If
          - EnableTikTok
          - Id: tiktok-dest
            Settings:
              - Url: !Sub "rtmp://push.tiktok.com/live/${TikTokStreamKey}"
          - !Ref AWS::NoValue
        - !If
          - EnableYouTube
          - Id: youtube-dest
            Settings:
              - Url: !Sub "rtmp://a.rtmp.youtube.com/live2/${YouTubeStreamKey}"
          - !Ref AWS::NoValue
        - !If
          - EnableInstagram
          - Id: instagram-dest
            Settings:
              - Url: !Sub "rtmps://live-api-s.facebook.com:443/rtmp/${InstagramStreamKey}"
          - !Ref AWS::NoValue
        - !If
          - EnableFacebook
          - Id: facebook-dest
            Settings:
              - Url: !Sub "rtmps://live-api-s.facebook.com:443/rtmp/${FacebookStreamKey}"
          - !Ref AWS::NoValue

      Tags:
        Name: !Sub "${EnvironmentName}-channel"

  # -------------------------------------------------------------------------
  # CloudFront – Origin Access Control for MediaPackage
  # -------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-mediapackage-oac"
        OriginAccessControlOriginType: mediapackagev2
        SigningBehavior: always
        SigningProtocol: sigv4

  # -------------------------------------------------------------------------
  # CloudFront – Origin Access Control for S3
  # -------------------------------------------------------------------------
  CloudFrontS3OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # -------------------------------------------------------------------------
  # CloudFront – Distribution (live HLS + VOD clips)
  # -------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${EnvironmentName} vertical video CDN"
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100   # US/EU only – cheapest

        Origins:
          # Live origin – MediaPackage v2
          # Domain is the MediaPackage endpoint hostname (extracted from the full URL)
          - Id: MediaPackageLiveOrigin
            DomainName: !Sub "${EnvironmentName}-channel-group.mediapackagev2.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !Ref CloudFrontOAC
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]

          # VOD origin – S3 clips bucket
          - Id: S3ClipsOrigin
            DomainName: !GetAtt ClipsBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontS3OAC
            S3OriginConfig:
              OriginAccessIdentity: ""

          # Live archive origin – S3 live archive bucket
          - Id: S3LiveArchiveOrigin
            DomainName: !GetAtt LiveArchiveBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontS3OAC
            S3OriginConfig:
              OriginAccessIdentity: ""

        DefaultCacheBehavior:
          TargetOriginId: MediaPackageLiveOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 08627262-05a9-4f76-9ded-b50ca2e3a84f  # Elemental MediaPackage managed policy
          OriginRequestPolicyId: 775133bc-15f2-49f9-abea-afb2e0bf67d2  # CORS-S3Origin
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true

        CacheBehaviors:
          # VOD clips path
          - PathPattern: "/clips/*"
            TargetOriginId: S3ClipsOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

          # Live archive path
          - PathPattern: "/archive/*"
            TargetOriginId: S3LiveArchiveOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true

      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-distribution"

  # -------------------------------------------------------------------------
  # Lambda – Highlight clip processor (time-shifted playback from MediaPackage)
  # -------------------------------------------------------------------------
  ClipProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-clip-processor"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      MemorySize: 512
      Role: !GetAtt ClipLambdaRole.Arn
      Environment:
        Variables:
          CLIP_BUCKET: !Ref ClipsBucket
          ENDPOINT_URL: !Select [0, !GetAtt MediaPackageHlsEndpoint.HlsManifestUrls]
          SNS_TOPIC_ARN: !Ref ClipNotificationTopic
      Code:
        ZipFile: |
          import boto3
          import os
          import json
          import urllib.request
          from datetime import datetime, timedelta, timezone

          s3 = boto3.client('s3')
          sns = boto3.client('sns')

          def handler(event, context):
              print(f"Received event: {json.dumps(event)}")
              detail = event.get('detail', {})
              timescale = detail.get('timescale', 90000)
              start_pts = detail.get('startPts', 0)
              end_pts = detail.get('endPts', 0)
              tags = detail.get('tags', [])
              event_time = event.get('time', '')
              duration_seconds = (end_pts - start_pts) / timescale
              buffer_before = 15
              buffer_after = 12
              print(f"AI detected: {tags}, duration: {duration_seconds}s")
              import time
              time.sleep(10)
              if event_time:
                  detection_time = datetime.fromisoformat(event_time.replace('Z', '+00:00'))
              else:
                  detection_time = datetime.now(timezone.utc)
              start_time = detection_time - timedelta(seconds=duration_seconds + buffer_before)
              end_time = detection_time + timedelta(seconds=buffer_after)
              start_iso = start_time.strftime('%Y-%m-%dT%H:%M:%SZ')
              end_iso = end_time.strftime('%Y-%m-%dT%H:%M:%SZ')
              tag_str = '-'.join(tags) if tags else 'highlight'
              timestamp_str = detection_time.strftime('%Y%m%d-%H%M%S')
              clip_id = f"{tag_str}-{timestamp_str}"
              endpoint_url = os.environ['ENDPOINT_URL']
              base_endpoint = endpoint_url.split('?')[0]
              time_shifted_url = f"{base_endpoint}?start={start_iso}&end={end_iso}"
              bucket = os.environ['CLIP_BUCKET']
              try:
                  req = urllib.request.Request(time_shifted_url)
                  with urllib.request.urlopen(req, timeout=30) as response:
                      manifest_content = response.read().decode('utf-8')
                  base_url = base_endpoint.rsplit('/', 1)[0] + '/'
                  lines = manifest_content.strip().split('\n')
                  is_master = any('#EXT-X-STREAM-INF' in line for line in lines)
                  if is_master:
                      variant_url = None
                      for i, line in enumerate(lines):
                          if '#EXT-X-STREAM-INF' in line and i + 1 < len(lines):
                              variant_url = lines[i + 1].strip()
                              if not variant_url.startswith('http'):
                                  variant_url = base_url + variant_url
                              break
                      if not variant_url:
                          raise Exception("No variant playlist found")
                      req = urllib.request.Request(variant_url)
                      with urllib.request.urlopen(req, timeout=30) as response:
                          manifest_content = response.read().decode('utf-8')
                      base_url = variant_url.rsplit('/', 1)[0] + '/'
                      lines = manifest_content.strip().split('\n')
                  segment_list = []
                  for i, line in enumerate(lines):
                      if line.startswith('#EXTINF:'):
                          dur = float(line.split(':')[1].rstrip(','))
                          if i + 1 < len(lines):
                              seg_url = lines[i + 1].strip()
                              if seg_url.startswith('#'):
                                  continue
                              if not seg_url.startswith('http'):
                                  seg_url = base_url + seg_url
                              segment_list.append({'url': seg_url, 'duration': dur})
                  total_needed = duration_seconds + buffer_before + buffer_after
                  selected_segments = []
                  collected_duration = 0
                  for seg in reversed(segment_list):
                      selected_segments.insert(0, seg)
                      collected_duration += seg['duration']
                      if collected_duration >= total_needed:
                          break
                  if not selected_segments:
                      raise Exception("No segments found")
                  clip_prefix = f"clips/{clip_id}"
                  segment_files = []
                  for idx, seg in enumerate(selected_segments):
                      seg_filename = f"segment_{idx:04d}.ts"
                      req = urllib.request.Request(seg['url'])
                      with urllib.request.urlopen(req, timeout=30) as response:
                          seg_data = response.read()
                      s3.put_object(Bucket=bucket, Key=f"{clip_prefix}/{seg_filename}", Body=seg_data, ContentType='video/MP2T')
                      segment_files.append({'filename': seg_filename, 'duration': seg['duration']})
                  clip_manifest = "#EXTM3U\n#EXT-X-VERSION:3\n"
                  clip_manifest += f"#EXT-X-TARGETDURATION:{int(max(s['duration'] for s in segment_files)) + 1}\n"
                  clip_manifest += "#EXT-X-MEDIA-SEQUENCE:0\n#EXT-X-PLAYLIST-TYPE:VOD\n"
                  for seg in segment_files:
                      clip_manifest += f"#EXTINF:{seg['duration']:.6f},\n{seg['filename']}\n"
                  clip_manifest += "#EXT-X-ENDLIST\n"
                  manifest_key = f"{clip_prefix}/index.m3u8"
                  s3.put_object(Bucket=bucket, Key=manifest_key, Body=clip_manifest.encode('utf-8'), ContentType='application/vnd.apple.mpegurl')
                  total_duration = sum(s['duration'] for s in segment_files)
                  print(f"Clip saved: s3://{bucket}/{manifest_key} ({len(segment_files)} segments, {total_duration:.1f}s)")
                  sns.publish(TopicArn=os.environ['SNS_TOPIC_ARN'], Subject=f"Highlight: {tag_str}",
                      Message=json.dumps({'event': tag_str, 'clipId': clip_id, 'bucket': bucket, 'manifestKey': manifest_key, 'segments': len(segment_files), 'duration': f"{total_duration:.1f}s"}, indent=2))
                  return {'statusCode': 200, 'clipId': clip_id, 'duration': total_duration}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  raise

  # -------------------------------------------------------------------------
  # EventBridge – Triggered when Elemental Inference detects a highlight
  # -------------------------------------------------------------------------
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ClipProcessorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HighlightDetectionRule.Arn

  HighlightDetectionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentName}-highlight-rule"
      Description: Triggers clipping when AI detects a highlight
      EventPattern:
        source:
          - aws.elemental-inference
        detail-type:
          - Clip Metadata Generated
      State: ENABLED
      Targets:
        - Id: ClipProcessor
          Arn: !GetAtt ClipProcessorFunction.Arn

  # -------------------------------------------------------------------------
  # SNS – Clip notifications
  # -------------------------------------------------------------------------
  ClipNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-clip-notifications"

  # -------------------------------------------------------------------------
  # CloudWatch Log Group – MediaLive channel logs
  # -------------------------------------------------------------------------
  MediaLiveLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/medialive/${EnvironmentName}"
      RetentionInDays: 7

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  MediaLiveChannelId:
    Description: MediaLive Channel ID
    Value: !Ref MediaLiveChannel
    Export:
      Name: !Sub "${EnvironmentName}-medialive-channel-id"

  MediaLiveSrtInputId:
    Description: MediaLive SRT Input ID (use this to get the SRT endpoint URL)
    Value: !Ref MediaLiveSrtInput
    Export:
      Name: !Sub "${EnvironmentName}-srt-input-id"

  MediaPackageChannelGroupName:
    Description: MediaPackage v2 Channel Group Name
    Value: !Sub "${EnvironmentName}-channel-group"
    Export:
      Name: !Sub "${EnvironmentName}-mp-channel-group"

  MediaPackageChannelName:
    Description: MediaPackage v2 Channel Name
    Value: !Sub "${EnvironmentName}-channel"
    Export:
      Name: !Sub "${EnvironmentName}-mp-channel"

  HlsPlaybackUrl:
    Description: MediaPackage V2 HLS endpoint URL (direct playback)
    Value: !Select [0, !GetAtt MediaPackageHlsEndpoint.HlsManifestUrls]
    Export:
      Name: !Sub "${EnvironmentName}-playback-url"

  ClipsBucketName:
    Description: S3 bucket for harvested highlight clips
    Value: !Ref ClipsBucket
    Export:
      Name: !Sub "${EnvironmentName}-clips-bucket"

  LiveArchiveBucketName:
    Description: S3 bucket for full live stream archive (7-day retention)
    Value: !Ref LiveArchiveBucket
    Export:
      Name: !Sub "${EnvironmentName}-live-archive-bucket"

  HighlightLambdaArn:
    Description: Lambda function for highlight clip processing
    Value: !GetAtt ClipProcessorFunction.Arn
    Export:
      Name: !Sub "${EnvironmentName}-clip-lambda"

  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${EnvironmentName}-cloudfront-domain"

  TikTokDeliveryStatus:
    Description: TikTok LIVE delivery status
    Value: !If [EnableTikTok, "ENABLED – pushing to rtmp://push.tiktok.com/live/", "DISABLED – no stream key provided"]

  YouTubeDeliveryStatus:
    Description: YouTube LIVE delivery status
    Value: !If [EnableYouTube, "ENABLED – pushing to rtmp://a.rtmp.youtube.com/live2/", "DISABLED – no stream key provided"]

  InstagramDeliveryStatus:
    Description: Instagram LIVE delivery status
    Value: !If [EnableInstagram, "ENABLED – pushing to rtmps://live-api-s.facebook.com:443/rtmp/", "DISABLED – no stream key provided"]

  FacebookDeliveryStatus:
    Description: Facebook LIVE delivery status
    Value: !If [EnableFacebook, "ENABLED – pushing to rtmps://live-api-s.facebook.com:443/rtmp/", "DISABLED – no stream key provided"]

  SocialDeliverySummary:
    Description: Summary of active social platform outputs
    Value: !Sub
      - "TikTok:${TT} | YouTube:${YT} | Instagram:${IG} | Facebook:${FB}"
      - TT: !If [EnableTikTok, "ON", "OFF"]
        YT: !If [EnableYouTube, "ON", "OFF"]
        IG: !If [EnableInstagram, "ON", "OFF"]
        FB: !If [EnableFacebook, "ON", "OFF"]
